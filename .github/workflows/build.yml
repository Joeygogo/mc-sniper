name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name mc_sniper mc_sniper.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: mc_sniper_windows
          path: dist/mc_sniper.exe
